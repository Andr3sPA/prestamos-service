server:
  port: 8081
  address: 0.0.0.0

spring:
  application:
    name: "JavaReactivo"
  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    properties:
      sslMode: require

  sql:
    init:
      platform: postgres

  devtools:
    add-properties: false

  h2:
    console:
      enabled: true
      path: /h2

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true

cors:
  allowed-origins: "*"

routes:
  paths:
    loanApplication: "/api/v1/solicitud"

adapters:
  restconsumer:
    timeout: 5000
    url: http://localhost:8081
  r2dbc:
    host: ${R2DBC_HOST}
    port: ${R2DBC_PORT}
    database: ${R2DBC_DATABASE}
    schema: public
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    options: sslmode=require

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
